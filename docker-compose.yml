version: '3.8'

services:
  # Local Postgres with pgvector for offline testing (optional, since Supabase Postgres is primary)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legalease-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: legalease
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Local Redis for caching & rate limiting
  redis:
    image: redis:7-alpine
    container_name: legalease-redis
    ports:
      - "6379:6379"

  # Local Kafka for async task queue
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: legalease-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: legalease-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  pgdata:
